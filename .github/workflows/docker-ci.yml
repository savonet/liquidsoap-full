name: Build CI Docker Images

on:
  workflow_dispatch:

jobs:
  build-debian-ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base_image: [debian:forky, debian:trixie, ubuntu:resolute, ubuntu:plucky]
        ocaml_version: ["4.14.2", "5.4.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: depot/setup-action@v1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        working-directory: docker
        env:
          DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
        run: ./build-ci.sh ${{ matrix.base_image }} ${{ matrix.ocaml_version }}

  build-alpine-ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ocaml_version: ["4.14.2", "5.4.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: depot/setup-action@v1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        working-directory: docker
        env:
          DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
        run: ./build-alpine-ci.sh ${{ matrix.ocaml_version }}
